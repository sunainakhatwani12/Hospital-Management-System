<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">

<div class="container-fluid">

<a class="navbar-brand fw-bold"
href="index.html">

Hospital Management System

<div class="navbar-nav ms-auto">

href="index.html">

</div>

<div class="container mt-4">

<h2 class="mb-4">

Patient Management

</h2>

<!-- ADD PATIENT -->

<div class="card mb-4">

<div class="card-body">

<h5 class="mb-3">

Add New Patient

</h5>

<form id="patientForm">

<div class="row g-3">

<div class="col-md-3">

<input
type="text"
id="first_name"
class="form-control"
placeholder="First Name"
required>

</div>

<div class="col-md-3">

<input
type="text"
id="last_name"
class="form-control"
placeholder="Last Name"
required>

</div>

<div class="col-md-2">

<select
id="gender"
class="form-control">

<option value="">
Gender
</option>

<option value="Male">
Male
</option>

<option value="Female">
Female
</option>

</select>

</div>

<div class="col-md-2">

<input
type="text"
id="phone"
class="form-control"
placeholder="Phone">

</div>

<div class="col-md-2">

<button
class="btn btn-success w-100">

Add Patient

</button>

</div>

</div>

</form>

</div>

</div>

<!-- PATIENT TABLE -->

<div class="card">

<div class="card-body">

<h5>

Patient Records

</h5>

<table
class="table table-striped table-hover mt-3">

<thead>

<tr>

<th>ID</th>
<th>Name</th>
<th>Gender</th>
<th>Phone</th>
<th>Actions</th>

</tr>

</thead>

<tbody id="patientsTable">

</tbody>

</table>

</div>

</div>

</div>

<script src="patients.js"></script>

<script
src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
</script>

</body>
</html>
