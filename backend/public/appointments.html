<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Appointment Management</title>

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">

<div class="container-fluid">

<a class="navbar-brand fw-bold"
href="index.html">

Hospital Management System

</a>

<div class="navbar-nav ms-auto">

<a class="nav-link"
href="index.html">

Dashboard

</a>

<a class="nav-link"
href="patients.html">

Patients

</a>

<a class="nav-link"
href="doctors.html">

Doctors

</a>

<a class="nav-link active"
href="appointments.html">

Appointments

</a>

</div>

</div>

</nav>

<div class="container mt-4">

<h2 class="mb-4">

Appointment Management

</h2>

<!-- ADD APPOINTMENT -->

<div class="card mb-4">

<div class="card-body">

<h5 class="mb-3">

Book Appointment

</h5>

<form id="appointmentForm">

<div class="row g-3">

<div class="col-md-3">

<select
id="patient_id"
class="form-control"
required>

<option value="">
Select Patient
</option>

</select>

</div>

<div class="col-md-3">

<select
id="doctor_id"
class="form-control"
required>

<option value="">
Select Doctor
</option>

</select>

</div>

<div class="col-md-3">

<input
type="date"
id="appointment_date"
class="form-control"
required>

</div>

<div class="col-md-2">

<select
id="status"
class="form-control">

<option value="Scheduled">
Scheduled
</option>

<option value="Completed">
Completed
</option>

<option value="Cancelled">
Cancelled
</option>

</select>

</div>

<div class="col-md-1">

<button
class="btn btn-success w-100">

Add

</button>

</div>

</div>

</form>

</div>

</div>

<!-- APPOINTMENT TABLE -->

<div class="card">

<div class="card-body">

<h5>

Appointment Records

</h5>

<table
class="table table-striped table-hover mt-3">

<thead>

<tr>

<th>ID</th>
<th>Patient</th>
<th>Doctor</th>
<th>Date</th>
<th>Status</th>
<th>Actions</th>

</tr>

</thead>

<tbody id="appointmentsTable">

</tbody>

</table>

</div>

</div>

</div>

<script src="appointments.js"></script>

<script
src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
</script>

</body>
</html>
